schemaVersion: 1
name: "srvcs-inrange"
slug: "inrange"
repository: "srvcs/inrange"
package: "srvcs-inrange"
function: "range: is value within [lo, hi]"
kind: "orchestrator"
categories:
  - "range"
dependencies:
  - slug: "between"
    service: "srvcs-between"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "value"
    type: "json"
    required: true
  - name: "lo"
    type: "json"
    required: true
  - name: "hi"
    type: "json"
    required: true
outputs:
  - name: "value"
    type: "json"
  - name: "lo"
    type: "json"
  - name: "hi"
    type: "json"
  - name: "result"
    type: "boolean"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_BETWEEN_URL"
    default: "http://127.0.0.1:8087"
    purpose: "Base URL for srvcs-between"
